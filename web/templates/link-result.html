{{define "link-result"}}
<div class="rounded-xl bg-emerald-50 p-4 sm:p-5 ring-1 ring-emerald-200
            dark:bg-emerald-500/10 dark:ring-emerald-500/30">
  <div class="flex items-center gap-2">
    <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"
         class="h-4 w-4 text-emerald-600 dark:text-emerald-400">
      <path fill-rule="evenodd"
            d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.707-9.293a1 1 0 0 0-1.414-1.414L9 10.586 7.707 9.293a1 1 0 0 0-1.414 1.414l2 2a1 1 0 0 0 1.414 0l4-4Z"
            clip-rule="evenodd"/>
    </svg>
    <p class="text-sm font-medium text-emerald-700 dark:text-emerald-300">Created.</p>
  </div>
  <div class="mt-3 flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
    <input id="short-url" readonly value="{{.Link.ShortURL}}"
      class="flex-1 min-w-0 rounded-lg border border-emerald-200 bg-white px-3 py-2
             font-mono text-sm text-indigo-700 select-all
             focus:outline-none focus:ring-2 focus:ring-emerald-500
             dark:border-emerald-500/30 dark:bg-slate-900 dark:text-indigo-300
             dark:focus:ring-emerald-400/50">
    <button type="button"
      data-copy-target="short-url"
      data-copy-label="Copy"
      class="inline-flex items-center justify-center
             rounded-lg bg-emerald-600 px-4 py-2 text-white font-medium shadow-sm
             hover:bg-emerald-500
             focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500
             focus-visible:ring-offset-2 focus-visible:ring-offset-emerald-50
             dark:focus-visible:ring-offset-slate-900
             active:bg-emerald-700
             transition-colors">
      Copy
    </button>
  </div>
  <p class="mt-3 truncate text-xs text-slate-500 dark:text-slate-400">
    &rarr; {{.Link.TargetURL}}
  </p>
  {{with humanExpiry .Link.ExpiresAt}}
  <p class="mt-1 text-xs font-medium text-amber-700 dark:text-amber-400">Expires: {{.}}</p>
  {{end}}
</div>

<!-- Out-of-band swap: refresh the recent list to include the new link. The
     payload here contains both Items and NextCursor (see linkResultData). -->
<div id="recent" hx-swap-oob="true">
  {{template "recent-list" .}}
</div>
{{end}}
