# golangci-lint configuration.
# Keep the linter set small but strict; we will add more linters as the codebase grows.
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
  settings:
    revive:
      rules:
        - name: var-naming
        - name: exported
          disabled: true
    gosec:
      excludes:
        # G104 (errcheck duplicate) is already covered by errcheck.
        - G104

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/vancanhuit/url-shortener

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
