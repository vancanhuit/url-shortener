# Local development & integration-test stack.
#
# Two profiles, both selected explicitly:
#
#   `dev` profile  -- `db`, `redis`, `server`
#     Full local dev loop on standard ports (5432 / 6379 / 8080).
#     The server has AUTO_MIGRATE=true so it applies pending migrations
#     before opening the listener; production deploys should leave
#     AUTO_MIGRATE off and run `migrate up` as a separate one-shot.
#     Same stack drives the CI compose-smoke job.
#
#       Bring up:  docker compose --profile=dev up --wait -d
#       Tear down: docker compose --profile=dev down -v
#
#   `test` profile -- `db-test`, `redis-test`
#     Isolated db + redis on alternate host ports (5433 / 6380) with
#     their own volumes. Driven by `just test-integration`, which runs
#     the binary from the host. Alternate ports + volumes mean dev and
#     test stacks coexist, so a running dev environment doesn't have
#     to be torn down to run the integration suite.
#
#       Bring up:  docker compose --profile=test up --wait -d
#       Tear down: docker compose --profile=test down -v
#
#   `tls` profile  -- `db`, `redis`, `server-tls`
#     Mirrors `dev` but the binary speaks HTTPS on :8443 using a static
#     cert + key mounted from `./dev/certs/` (generate them once with
#     `just dev-certs`, gitignored). `db` and `redis` are reused via
#     multi-profile membership; the `tls` profile also exposes them on
#     the same standard host ports as `dev` so the two profiles must
#     not be running simultaneously.
#
#       Prereq:    just dev-certs        (one-time per host)
#       Bring up:  docker compose --profile=tls up --wait -d
#       Tear down: docker compose --profile=tls down -v
#       Test:      curl https://localhost:8443/healthz
#
# Every service is profile-gated, so a bare `docker compose up` starts
# nothing. That's intentional: the previous arrangement (default
# services + a test profile) had compose start the default services
# *in addition to* test ones whenever `--profile=test` was passed,
# because no-profile services run for every invocation. Forcing every
# profile to be opt-in eliminates that accidental overlap.
# `db` and `redis` are members of both `dev` and `tls` so the two
# profiles share the same data store; only one can run at a time
# because they bind the same host ports (5432 / 6379).

name: url-shortener

# --- fragments ----------------------------------------------------------------
# YAML anchors hosted on `x-*` extension fields, merged into services with
# `<<: *anchor`. This shares image/env/healthcheck/restart between the
# default services and their `test`-profile twins; per-service blocks
# below add only what differs (volumes, ports, profile).
# Docs: https://docs.docker.com/reference/compose-file/fragments/

x-postgres-base: &postgres-base
  image: postgres:18.3-trixie
  environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: url_shortener
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
    interval: 5s
    timeout: 3s
    retries: 10
  restart: unless-stopped

x-redis-base: &redis-base
  image: redis:8.6.2-trixie
  command: ["redis-server", "--appendonly", "yes"]
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 5s
    timeout: 3s
    retries: 10
  restart: unless-stopped

services:
  # --- `dev` profile --------------------------------------------------------
  # Full local dev loop and the same stack the CI compose-smoke job
  # exercises. See file header for invocation.

  db:
    <<: *postgres-base
    profiles: ["dev", "tls"]
    # Postgres 18+ expects a single mount at /var/lib/postgresql; the actual
    # data dir lives in a versioned subdirectory inside it (e.g. 18/docker).
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"

  redis:
    <<: *redis-base
    profiles: ["dev", "tls"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # `server`: runs the binary in `run` mode. With AUTO_MIGRATE=true it
  # applies pending migrations before opening the listener, so the stack
  # is fully ready as soon as `up --wait` returns.
  server:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: dev
        COMMIT: dev
    command: ["run"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      URL_SHORTENER_ADDR: ":8080"
      URL_SHORTENER_ENV: dev
      URL_SHORTENER_LOG_LEVEL: debug
      URL_SHORTENER_LOG_FORMAT: text
      URL_SHORTENER_DATABASE_URL: postgres://postgres:postgres@db:5432/url_shortener?sslmode=disable
      URL_SHORTENER_REDIS_URL: redis://redis:6379/0
      URL_SHORTENER_BASE_URL: http://localhost:8080
      URL_SHORTENER_AUTO_MIGRATE: "true"
    ports:
      - "8080:8080"
    # Distroless has no curl/wget; the binary's `healthcheck` subcommand
    # probes its own /healthz so docker / `up --wait` can tell when the
    # server is actually accepting requests (rather than just "container
    # started").
    healthcheck:
      test: ["CMD", "/usr/local/bin/url-shortener", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- `tls` profile --------------------------------------------------------
  # Same binary as `server`, but speaks HTTPS on :8443 using the cert +
  # key in ./dev/certs/ (run `just dev-certs` to generate them; both
  # files are gitignored). The compose volume is read-only so an
  # accidental rotation in the running container can't truncate the
  # PEM files on the host.

  server-tls:
    profiles: ["tls"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: dev
        COMMIT: dev
    command: ["run"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      URL_SHORTENER_ADDR: ":8443"
      URL_SHORTENER_ENV: dev
      URL_SHORTENER_LOG_LEVEL: debug
      URL_SHORTENER_LOG_FORMAT: text
      URL_SHORTENER_DATABASE_URL: postgres://postgres:postgres@db:5432/url_shortener?sslmode=disable
      URL_SHORTENER_REDIS_URL: redis://redis:6379/0
      URL_SHORTENER_BASE_URL: https://localhost:8443
      URL_SHORTENER_AUTO_MIGRATE: "true"
      URL_SHORTENER_TLS_CERT_FILE: /etc/url-shortener/certs/cert.pem
      URL_SHORTENER_TLS_KEY_FILE: /etc/url-shortener/certs/key.pem
    # Cert source defaults to ./dev/certs (the dir `just dev-certs`
    # writes to). The `just tls-smoke` recipe overrides this with
    # TLS_CERTS_DIR pointing at an isolated tempdir so the smoke run
    # never clobbers a developer's host-trusted dev certs.
    volumes:
      - ${TLS_CERTS_DIR:-./dev/certs}:/etc/url-shortener/certs:ro
    ports:
      - "8443:8443"
    # `--insecure` because the in-container loopback hop probes
    # https://127.0.0.1, which the mkcert-issued cert doesn't claim
    # (it's signed for localhost / 127.0.0.1 from the host's perspective
    # but the cert verifier inside the container has no view of the
    # host's local CA trust). The probe is a liveness check, not a
    # security boundary.
    healthcheck:
      test: ["CMD", "/usr/local/bin/url-shortener", "healthcheck", "--url=https://127.0.0.1:8443/healthz", "--insecure"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- `test` profile -------------------------------------------------------
  # Isolated db + redis for the integration suite. Reuse the same fragments
  # as the default services so image/env/healthcheck stay in lockstep; only
  # profile, volumes, and host ports differ.

  db-test:
    <<: *postgres-base
    profiles: ["test"]
    volumes:
      - db_test_data:/var/lib/postgresql
    ports:
      - "5433:5432"

  redis-test:
    <<: *redis-base
    profiles: ["test"]
    volumes:
      - redis_test_data:/data
    ports:
      - "6380:6379"

volumes:
  db_data:
  redis_data:
  db_test_data:
  redis_test_data:
