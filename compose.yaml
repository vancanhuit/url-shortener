# Local development & integration-test stack.
#
# Default profile: brings up just `db` and `redis`. This is what the
# integration tests use (the test process runs from the host and applies
# migrations via the binary directly), and also what you want when
# iterating on Go code natively (`./bin/url-shortener run` on the host).
#
# `dev` profile: adds the `server` container, which runs the binary in
# `run` mode. URL_SHORTENER_AUTO_MIGRATE=true makes it apply pending
# migrations before serving. Production deploys should leave AUTO_MIGRATE
# off and run `migrate up` as a separate one-shot step.
#
# Tear down with `docker compose down -v` -- `down` ignores profiles so
# this cleans up regardless of how the stack was started.

name: url-shortener

services:
  db:
    image: postgres:18.3-trixie
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    volumes:
      # Postgres 18+ expects a single mount at /var/lib/postgresql; the actual
      # data dir lives in a versioned subdirectory inside it (e.g. 18/docker).
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8.6.2-trixie
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # `server`: runs the binary in `run` mode. With AUTO_MIGRATE=true it
  # applies pending migrations before opening the listener, so the stack
  # is fully ready as soon as `up --wait` returns. Only in the `dev`
  # profile -- integration tests don't go through HTTP so they bring up
  # only db+redis and exercise the binary directly from the host.
  server:
    profiles: ["dev"]
    image: url-shortener:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: dev
        COMMIT: dev
    command: ["run"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      URL_SHORTENER_ADDR: ":8080"
      URL_SHORTENER_ENV: dev
      URL_SHORTENER_LOG_LEVEL: debug
      URL_SHORTENER_LOG_FORMAT: text
      URL_SHORTENER_DATABASE_URL: postgres://postgres:postgres@db:5432/url_shortener?sslmode=disable
      URL_SHORTENER_REDIS_URL: redis://redis:6379/0
      URL_SHORTENER_BASE_URL: http://localhost:8080
      URL_SHORTENER_AUTO_MIGRATE: "true"
    ports:
      - "8080:8080"
    # Distroless has no curl/wget; the binary's `healthcheck` subcommand
    # probes its own /healthz so docker / `up --wait` can tell when the
    # server is actually accepting requests (rather than just "container
    # started").
    healthcheck:
      test: ["CMD", "/usr/local/bin/url-shortener", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
