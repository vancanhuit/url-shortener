name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Pinned toolchain versions. Bump these in one place; jobs reference them
# via ${{ env.GO_VERSION }} etc.
#
# GOLANGCI_LINT_VERSION must stay in sync with the constant of the same name
# in the Justfile, since `just lint` self-installs golangci-lint at that
# version. The workflow exports it so the Justfile can pick it up via the
# GOLANGCI_LINT_VERSION shell variable when set.
env:
  GO_VERSION: 1.26.2
  NODE_VERSION: 24.14.1
  GOLANGCI_LINT_VERSION: 2.11.4
  REGISTRY: ghcr.io
  # Opt every JS-based action into the Node 24 runtime ahead of the
  # June 2026 deadline. Some third-party actions we depend on (e.g.
  # extractions/setup-just) haven't cut a Node 24 release yet; this
  # flag lets us run them on the newer runtime today without waiting.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    # Skip on direct pushes to main; the PR run already validated the title /
    # commits, and the squash-merge produces a fresh conventional commit.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      # commitlint runs `just init`, which `npm ci`s the root toolchain
      # (husky + @commitlint/*). Point the npm cache at the root lockfile
      # rather than the Tailwind one, and skip the Go module cache since
      # this job never invokes the Go toolchain.
      - uses: ./.github/actions/setup-toolchain
        with:
          go-version: ${{ env.GO_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          go-cache: "false"
          node-cache-dependency-path: package-lock.json
      - run: just init
      # The PR title becomes the squash-merge commit message on `main`, so
      # that's the message that has to be conventional. Per-commit hygiene
      # is enforced locally by the husky `commit-msg` hook.
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: just commitlint-msg "$PR_TITLE"

  go:
    name: go (build / test / lint)
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so `just build` -> `git describe` can resolve the
      # version string against the most recent tag, producing meaningful
      # `v1.2.3-N-gSHA` ldflags on PR/main builds instead of the bare SHA.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # `just build` depends on `web-build`, which `npm ci`s the Tailwind +
      # htmx toolchain in web/tailwind/ and emits the .gitignore'd assets
      # the Go binary embeds. The composite caches Go modules and npm,
      # keyed on web/tailwind/package-lock.json by default.
      - uses: ./.github/actions/setup-toolchain
        with:
          go-version: ${{ env.GO_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
      - name: just build
        run: just build
      - name: just test
        run: just test
      # `just lint` self-installs golangci-lint at the version pinned in the
      # Justfile (GOLANGCI_LINT_VERSION). The workflow-level env var of the
      # same name above documents the expected pin.
      - name: just lint
        run: just lint

  go-integration:
    name: go (integration)
    runs-on: ubuntu-latest
    steps:
      # Same fetch-depth: 0 reasoning as the `go` job above.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Same toolchain setup as the `go` job: `just test-integration`
      # depends on `build`, which depends on `web-build` (npm ci).
      - uses: ./.github/actions/setup-toolchain
        with:
          go-version: ${{ env.GO_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
      # `just test-integration` brings up the `test`-profile infra
      # (db-test on 5433 + redis-test on 6380), builds the binary, applies
      # migrations against the test DB, and runs the build-tagged tests --
      # all in one recipe so local dev and CI follow the same path. The
      # connection URLs are hardcoded inside the recipe to match
      # compose.yaml; no per-job env overrides are needed here.
      - name: just test-integration
        run: just test-integration
      - name: tear down test infra
        if: always()
        run: docker compose --profile=test down -v

  binaries:
    name: binaries
    # Cross-compile the binary for linux/darwin x amd64/arm64 and upload
    # the resulting tar.gz archives, per-archive .tar.gz.sha256 files,
    # and the aggregate SHA256SUMS as a workflow artifact:
    #
    #   - on PR:        binaries-pr-<number>      (7d retention)
    #   - on main push: binaries-main-<short_sha> (30d retention)
    #
    # On PRs the artifact lets reviewers grab a build without checking
    # out and rebuilding locally. On main, it complements the GHCR
    # `:edge` / `:main-<sha>` images for users who deploy bare binaries
    # rather than containers (e.g. systemd hosts), giving them a stable
    # download URL between tagged releases.
    needs: go
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so the version baked into each binary reflects
      # the distance from the most recent tag (e.g. `v1.2.3-5-gabcdef0`).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-toolchain
        with:
          go-version: ${{ env.GO_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: just release-binaries
        run: just release-binaries

      # Pick a name + retention that reflects the trigger so PR and main
      # artifacts don't collide and main builds stick around long enough
      # to be useful between tagged releases.
      - name: Resolve artifact name
        id: artifact
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=binaries-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "retention=7" >> "$GITHUB_OUTPUT"
          else
            short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "name=binaries-main-$short_sha" >> "$GITHUB_OUTPUT"
            echo "retention=30" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            dist/url-shortener_*.tar.gz
            dist/url-shortener_*.tar.gz.sha256
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: ${{ steps.artifact.outputs.retention }}

  image:
    name: docker image
    # Build the multi-arch image on every event:
    #
    #   - on PR: export it as an OCI-format tarball and upload as a
    #     workflow artifact, validating that the Dockerfile cross-builds
    #     cleanly without granting fork PRs GHCR write access.
    #   - on main push: push to GHCR with :edge (floating dev tag) and
    #     :main-<short_sha> (immutable, commit-pinned). `:latest` is
    #     reserved for stable releases and lives in release.yaml.
    #
    # Tagged-release publishing lives in .github/workflows/release.yaml.
    needs: go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # fetch-depth: 0 so the version build-arg picked up below reflects
      # the distance from the most recent tag (e.g. `v1.2.3-5-gabcdef0`),
      # not just the bare commit SHA.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Resolve VERSION (via `git describe`) + DATE (committer timestamp,
      # RFC3339 UTC). Same composite is used by release.yaml with
      # `version-source: tag` so binary, image tag, and git tag all line
      # up on tag pushes.
      - name: Resolve build metadata
        id: meta-build
        uses: ./.github/actions/resolve-build-metadata

      # No setup-qemu-action: every Dockerfile stage that runs commands
      # is pinned to --platform=$BUILDPLATFORM, and the Go builder
      # cross-compiles via GOOS/GOARCH instead of emulating the target.
      # The runtime stage is distroless with no RUN steps, so buildx
      # never has to execute target-arch instructions. Add QEMU back
      # if a future change introduces a RUN in a non-BUILDPLATFORM stage.
      - uses: docker/setup-buildx-action@v4

      # GHCR login only on main pushes. PRs (incl. forks) skip this and
      # would fail to push anyway -- the build below routes them to an
      # OCI tarball instead.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag layout:
      #   - main push: :edge (floating dev) + :main-<short_sha> (pinned)
      #   - PR build:  :pr-<number> (used only as the OCI manifest tag,
      #                              not pushed anywhere)
      # `:latest` belongs to release.yaml -- moved only by stable
      # (non-prerelease) tag pushes, so `docker pull foo:latest`
      # behaves the way most users expect.
      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=pr
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta-build.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta-build.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # PR path: produce an OCI-format tarball of the multi-arch image
      # and upload it as a workflow artifact. Reviewers can `docker load`
      # it locally; we also keep the artifact handy for any downstream
      # security-scanning step that may land later.
      - name: Build OCI tarball (PRs)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          outputs: type=oci,dest=./url-shortener-oci.tar
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta-build.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta-build.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload OCI tarball
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: oci-image-pr-${{ github.event.pull_request.number }}
          path: ./url-shortener-oci.tar
          if-no-files-found: error
          retention-days: 7
