name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    # Skip on direct pushes to main; the PR run already validated the title /
    # commits, and the squash-merge produces a fresh conventional commit.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm
      - uses: extractions/setup-just@v2
      - run: just init
      # The PR title becomes the squash-merge commit message on `main`, so
      # that's the message that has to be conventional. Per-commit hygiene
      # is enforced locally by the husky `commit-msg` hook.
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: just commitlint-msg "$PR_TITLE"

  go:
    name: go (build / test / lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.2
          cache: true
      - uses: extractions/setup-just@v2
      - name: install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: just build
        run: just build
      - name: just test
        run: just test
      - name: just lint
        run: just lint
