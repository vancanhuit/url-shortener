name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Pinned toolchain versions. Bump these in one place; jobs reference them
# via ${{ env.GO_VERSION }} etc.
#
# GOLANGCI_LINT_VERSION must stay in sync with the constant of the same name
# in the Justfile, since `just lint` self-installs golangci-lint at that
# version. The workflow exports it so the Justfile can pick it up via the
# GOLANGCI_LINT_VERSION shell variable when set.
env:
  GO_VERSION: 1.26.2
  NODE_VERSION: 24.14.1
  GOLANGCI_LINT_VERSION: 2.11.4

jobs:
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    # Skip on direct pushes to main; the PR run already validated the title /
    # commits, and the squash-merge produces a fresh conventional commit.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: extractions/setup-just@v2
      - run: just init
      # The PR title becomes the squash-merge commit message on `main`, so
      # that's the message that has to be conventional. Per-commit hygiene
      # is enforced locally by the husky `commit-msg` hook.
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: just commitlint-msg "$PR_TITLE"

  go:
    name: go (build / test / lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # `just build` depends on `web-build`, which `npm ci`s the Tailwind +
      # htmx toolchain in web/tailwind/ and emits the .gitignore'd assets
      # the Go binary embeds. Cache is keyed on the tailwind lockfile.
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/tailwind/package-lock.json
      - uses: extractions/setup-just@v2
      - name: just build
        run: just build
      - name: just test
        run: just test
      # `just lint` self-installs golangci-lint at the version pinned in the
      # Justfile (GOLANGCI_LINT_VERSION). The workflow-level env var of the
      # same name above documents the expected pin.
      - name: just lint
        run: just lint

  go-integration:
    name: go (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Same setup-node story as the `go` job: `just test-integration`
      # depends on `build`, which depends on `web-build` (npm ci).
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/tailwind/package-lock.json
      - uses: extractions/setup-just@v2
      # `just test-integration` brings up the `test`-profile infra
      # (db-test on 5433 + redis-test on 6380), builds the binary, applies
      # migrations against the test DB, and runs the build-tagged tests --
      # all in one recipe so local dev and CI follow the same path. The
      # connection URLs are hardcoded inside the recipe to match
      # compose.yaml; no per-job env overrides are needed here.
      - name: just test-integration
        run: just test-integration
      - name: tear down test infra
        if: always()
        run: docker compose --profile=test down -v
