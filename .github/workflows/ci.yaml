name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Tool versions and environment variables for mise tasks are declared in
# mise.toml and injected automatically when `jdx/mise-action` runs.
# Only GitHub Actions-specific variables are set here.
env:
  REGISTRY: ghcr.io
  # Opt every JS-based action into the Node 24 runtime ahead of the
  # June 2026 deadline.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    # Skip on direct pushes to main; the PR run already validated the title /
    # commits, and the squash-merge produces a fresh conventional commit.
    if: github.event_name == 'pull_request'
    steps:
      # Audit-only runtime monitoring (step-security/harden-runner):
      # logs every outbound connection, file write, and process spawn
      # this job makes. Does NOT block in audit mode -- after a week
      # or two of data via the job summary, flip `egress-policy` to
      # `block` with a curated `allowed-endpoints` list. Repeated as
      # the first step of every job below; see this comment for why.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # commitlint runs `mise run init`, which `npm ci`s the root toolchain
      # (husky + @commitlint/*). Skip the Go module cache since this job
      # never invokes the Go toolchain.
      - uses: ./.github/actions/setup-toolchain
        with:
          go-cache: "false"
      - run: mise run init
      # The PR title becomes the squash-merge commit message on `main`, so
      # that's the message that has to be conventional. Per-commit hygiene
      # is enforced locally by the husky `commit-msg` hook.
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: mise run commitlint-msg "$PR_TITLE"

  go:
    name: go (build / test / lint)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # fetch-depth: 0 so `mise run build` -> `git describe` can resolve the
      # version string against the most recent tag, producing meaningful
      # `v1.2.3-N-gSHA` ldflags on PR/main builds instead of the bare SHA.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # `mise run build` depends on `web-build`, which `npm ci`s the
      # Vite + Svelte SPA toolchain in web/ and emits .gitignore'd
      # build artifacts under web/dist/ that the Go binary embeds.
      - uses: ./.github/actions/setup-toolchain
      - name: mise run build
        run: mise run build
      - name: mise run test
        run: mise run test
      # `mise run lint` runs golangci-lint, which is managed by mise
      # and available on PATH.
      - name: mise run lint
        run: mise run lint

  openapi:
    name: openapi (spectral)
    # Lint the OpenAPI 3.0 document at api/openapi.yaml using Spectral.
    # Spectral lives in package.json's devDependencies and is invoked
    # via `mise run lint-openapi`, which calls the `lint:openapi` npm
    # script with the project ruleset (.spectral.yaml). A drift
    # between the served spec and the code is caught by the Go unit
    # + integration tests in the `go` / `go-integration` jobs; this
    # job catches structural / style problems in the spec itself.
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Spectral is a Node tool with no Go dependency; skip the Go
      # module cache to keep this job's setup fast.
      - uses: ./.github/actions/setup-toolchain
        with:
          go-cache: "false"
      - name: mise run lint-openapi
        run: mise run lint-openapi

  web:
    name: web (svelte-check)
    # Type-check + Svelte-check the SPA. The `go` job already runs the
    # Vite production build via `mise run build` -> `web-build`, but that
    # path tolerates type errors (Svelte's compiler skips strict
    # checks). svelte-check + tsc are the strict gate; we run them in
    # their own job so the diagnostic output is easy to find.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
        with:
          go-cache: "false"
      - name: mise run web-fmt-check
        run: mise run web-fmt-check
      - name: mise run web-lint
        run: mise run web-lint
      - name: mise run web-test
        run: mise run web-test
      - name: mise run web-check
        run: mise run web-check

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # Vuln scanning works on source, so a shallow checkout is fine
      # (no `git describe` needed here).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-toolchain
        with:
          npm-cache: "false"
      # `mise run govulncheck` self-installs govulncheck@latest into $GOPATH/bin
      # and runs it with --build-tags=integration so the entire codebase
      # (including //go:build integration tests) is analysed for
      # reachable CVEs against the live https://pkg.go.dev/vuln database.
      - name: mise run govulncheck
        run: mise run govulncheck

  trivy:
    name: trivy (image scan)
    runs-on: ubuntu-latest
    # Don't burn a runner scanning a broken build; gating on `go`
    # ensures the binary at least compiles before we wrap it in a
    # container and look for OS-level CVEs.
    needs: go
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # `mise run trivy-image` calls `mise run docker-build` (the Dockerfile's
      # own builder stages handle Go + npm). trivy is managed by mise and
      # available on PATH — no separate install step required.
      - uses: jdx/mise-action@v4
        with:
          cache: true
      # Build the host-arch image and scan it with Trivy. trivy is pinned in
      # mise.toml and installed by mise-action — we avoid the
      # aquasecurity/trivy-action third-party action that was compromised in
      # the March-2026 supply-chain incident.
      #
      # The task gates on HIGH/CRITICAL severities and passes
      # --ignore-unfixed; bump the gate when the policy changes.
      - name: mise run trivy-image
        run: mise run trivy-image

  go-integration:
    name: go (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # Same fetch-depth: 0 reasoning as the `go` job above.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # Same toolchain setup as the `go` job: `mise run test-integration`
      # depends on `build`, which depends on `web-build` (npm ci).
      - uses: ./.github/actions/setup-toolchain
      # `mise run test-integration` brings up the `test`-profile infra
      # (db-test on 5433 + redis-test on 6380), builds the binary, applies
      # migrations against the test DB, and runs the build-tagged tests --
      # all in one task so local dev and CI follow the same path.
      - name: mise run test-integration
        run: mise run test-integration
      - name: tear down test infra
        if: always()
        run: docker compose --profile=test down -v

  compose-smoke:
    name: compose smoke test
    # Bring up the `dev` profile of compose.yaml (the same stack a
    # developer runs locally) and exercise the operational endpoints,
    # the embedded static assets, and a real shorten -> fetch ->
    # redirect cycle. Other CI jobs cover compile / unit / integration
    # / scan in isolation; this is the one that catches "binary builds
    # clean but the image doesn't actually serve" -- a missing COPY
    # for an embedded asset, a Dockerfile drift away from what the
    # binary expects, an env-var rename that silently broke a Postgres
    # 18 connection string, etc. Keeps compose.yaml itself honest too:
    # any field that drifts away from what the runner's compose plugin
    # accepts breaks the PR rather than a developer's first `up --wait`.
    #
    # Runs in parallel with the `image` job below: both build the same
    # Dockerfile independently. Sharing the GHA cache via compose's
    # build block isn't worth threading through here -- `image` is the
    # critical-path job (~2m), `compose-smoke` finishes well within
    # that even with a cold build.
    needs: go
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Compose v2 already drives BuildKit by default on hosted runners;
      # making buildx explicit here is just defensive against future
      # runner-image changes that flip the default back.
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # The smoke-check script is encapsulated in a mise task
      # (`mise run compose-smoke`) so dev iteration doesn't need a CI
      # round-trip.
      - uses: jdx/mise-action@v4
        with:
          cache: true

      # `--wait` blocks until each service's healthcheck reports
      # healthy. The server's healthcheck invokes the binary's own
      # `healthcheck` subcommand, which dials its own /livez, so by
      # the time `up` returns the listener is accepting traffic.
      # AUTO_MIGRATE=true (set in compose.yaml) ensures the schema is
      # applied before that point.
      - name: docker compose --profile=dev up --wait
        run: docker compose --profile=dev up --wait --detach

      # The task targets http://localhost:8080 by default, which is
      # the dev-profile published port. See .mise/tasks/compose-smoke for
      # the actual checks (operational endpoints, embedded static
      # assets, full shorten -> fetch -> redirect cycle).
      - name: mise run compose-smoke
        run: mise run compose-smoke

      # Always: dump server logs so a failure has its evidence in the
      # job log without having to re-run with debug. `--no-color`
      # keeps the output diffable; --tail caps log volume.
      - name: docker compose logs (server)
        if: always()
        run: docker compose --profile=dev logs --no-color --tail=200 server

      - name: docker compose --profile=dev down -v
        if: always()
        run: docker compose --profile=dev down -v

  compose-tls-smoke:
    name: compose tls smoke test
    # Bring up the `tls` profile (server-tls + db + redis) with a
    # mkcert-issued cert generated into an isolated CAROOT, then
    # verify HTTPS works end-to-end via `curl --cacert`. This is the
    # production counterpart of `compose-smoke`: same checks, but
    # against the TLS-terminating variant of the binary, exercising
    # the cfg.TLSCertFile branch of server.Serve in the same image
    # users actually deploy.
    #
    # The task (`mise run tls-smoke`) handles everything -- mkcert
    # CAROOT in a tempdir (no host-trust install), compose lifecycle
    # via trap, and a negative check that omitting --cacert fails
    # TLS verification. See .mise/tasks/tls-smoke for details.
    needs: go
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: jdx/mise-action@v4
        with:
          cache: true
      # mkcert is now managed by mise (pinned in mise.toml) and installed
      # by mise-action above — no apt fallback needed.

      - name: mise run tls-smoke
        run: mise run tls-smoke

      # Always: dump server-tls logs so a failure has its evidence in
      # the job log. The task's trap already runs `down -v`, so by
      # this point the container is gone -- but `logs` still works
      # against stopped containers until compose's network is removed,
      # which the trap also does. Use `|| true` so log retrieval failure
      # never masks a real test failure.
      - name: docker compose logs (server-tls)
        if: always()
        run: docker compose --profile=tls logs --no-color --tail=200 server-tls || true

  binaries:
    name: binaries
    # Cross-compile the binary for linux/darwin x amd64/arm64 and upload
    # the resulting tar.gz archives, per-archive .tar.gz.sha256 files,
    # and the aggregate SHA256SUMS as a workflow artifact:
    #
    #   - on PR:        binaries-pr-<number>      (7d retention)
    #   - on main push: binaries-main-<short_sha> (30d retention)
    #
    # On PRs the artifact lets reviewers grab a build without checking
    # out and rebuilding locally. On main, it complements the GHCR
    # `:edge` / `:main-<sha>` images for users who deploy bare binaries
    # rather than containers (e.g. systemd hosts), giving them a stable
    # download URL between tagged releases.
    needs: go
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # fetch-depth: 0 so the version baked into each binary reflects
      # the distance from the most recent tag (e.g. `v1.2.3-5-gabcdef0`).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-toolchain

      - name: mise run release-binaries
        run: mise run release-binaries

      # Pick a name + retention that reflects the trigger so PR and main
      # artifacts don't collide and main builds stick around long enough
      # to be useful between tagged releases.
      - name: Resolve artifact name
        id: artifact
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=binaries-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "retention=7" >> "$GITHUB_OUTPUT"
          else
            short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "name=binaries-main-$short_sha" >> "$GITHUB_OUTPUT"
            echo "retention=30" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload binaries artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            dist/url-shortener_*.tar.gz
            dist/url-shortener_*.tar.gz.sha256
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: ${{ steps.artifact.outputs.retention }}

  image:
    name: docker image
    # Build the multi-arch image on every event:
    #
    #   - on PR: export it as an OCI-format tarball and upload as a
    #     workflow artifact, validating that the Dockerfile cross-builds
    #     cleanly without granting fork PRs GHCR write access.
    #   - on main push: push to GHCR with :edge (floating dev tag) and
    #     :main-<short_sha> (immutable, commit-pinned). `:latest` is
    #     reserved for stable releases and lives in release.yaml.
    #
    # Tagged-release publishing lives in .github/workflows/release.yaml.
    needs: go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # fetch-depth: 0 so the version build-arg picked up below reflects
      # the distance from the most recent tag (e.g. `v1.2.3-5-gabcdef0`),
      # not just the bare commit SHA.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Resolve VERSION (via `git describe`) + DATE (committer timestamp,
      # RFC3339 UTC). Same composite is used by release.yaml with
      # `version-source: tag` so binary, image tag, and git tag all line
      # up on tag pushes.
      - name: Resolve build metadata
        id: meta-build
        uses: ./.github/actions/resolve-build-metadata

      # No setup-qemu-action: every Dockerfile stage that runs commands
      # is pinned to --platform=$BUILDPLATFORM, and the Go builder
      # cross-compiles via GOOS/GOARCH instead of emulating the target.
      # The runtime stage is distroless with no RUN steps, so buildx
      # never has to execute target-arch instructions. Add QEMU back
      # if a future change introduces a RUN in a non-BUILDPLATFORM stage.
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # GHCR login only on main pushes. PRs (incl. forks) skip this and
      # would fail to push anyway -- the build below routes them to an
      # OCI tarball instead.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag layout:
      #   - main push: :edge (floating dev) + :main-<short_sha> (pinned)
      #   - PR build:  :pr-<number> (used only as the OCI manifest tag,
      #                              not pushed anywhere)
      # `:latest` belongs to release.yaml -- moved only by stable
      # (non-prerelease) tag pushes, so `docker pull foo:latest`
      # behaves the way most users expect.
      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        env:
          # Write annotations onto both the multi-arch manifest index
          # AND each per-platform manifest. GHCR's package UI reads the
          # description (and other OCI fields) from the index for
          # multi-arch images, so leaving annotations at the default
          # ("manifest" only) leaves the registry page blank even though
          # the per-platform configs carry the same labels via
          # Dockerfile LABEL.
          # Docs: https://github.com/docker/metadata-action#annotations
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index,manifest
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          # Static OCI fields are also baked into the Dockerfile so
          # `docker build` outside CI inherits them; restating them
          # here is what populates the `annotations` output that the
          # build-push-action step consumes.
          labels: |
            org.opencontainers.image.title=url-shortener
            org.opencontainers.image.description=A small URL-shortener service with a JSON API and HTMX web UI.
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=vancanhuit
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
          tags: |
            type=ref,event=pr
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Annotations cover the manifest index for GHCR's UI; labels
          # cover the per-platform image configs for `docker inspect`.
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ steps.meta-build.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta-build.outputs.date }}
          # Attach an SPDX SBOM (sbom: true; BuildKit's default scanner
          # emits SPDX 2.3) and SLSA-style provenance in `max` mode (full
          # source/build-step graph) as in-toto attestations on the
          # manifest index. Consumers fetch them with
          # `docker buildx imagetools inspect ghcr.io/.../url-shortener:edge
          # --format '{{ json .SBOM }}'` (or .Provenance), and downstream
          # tools like `trivy sbom` / `cosign verify-attestation` can
          # consume them directly without rebuilding.
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # PR path: produce an OCI-format tarball of the multi-arch image
      # and upload it as a workflow artifact. Reviewers can `docker load`
      # it locally; we also keep the artifact handy for any downstream
      # security-scanning step that may land later.
      - name: Build OCI tarball (PRs)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          outputs: type=oci,dest=./url-shortener-oci.tar
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ steps.meta-build.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta-build.outputs.date }}
          # Mirror the main-only build so reviewers downloading the OCI
          # tarball get a complete artifact: the SBOM + provenance are
          # written into the same tarball next to the image manifests.
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload OCI tarball
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oci-image-pr-${{ github.event.pull_request.number }}
          path: ./url-shortener-oci.tar
          if-no-files-found: error
          retention-days: 7
