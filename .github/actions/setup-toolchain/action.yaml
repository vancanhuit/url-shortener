name: Set up toolchain
description: >-
  Install the Go, Bun, and Java toolchains used by every build/test/release
  job via mise (versions declared in mise.toml). Centralizes the action
  versions, cache config, and Node-24 opt-in so workflow jobs stay focused
  on what they actually run.

inputs:
  go-cache:
    description: >-
      Whether to cache Go modules and build artefacts between runs.
      Set to "false" for short-lived jobs that don't benefit from it
      (e.g. commitlint, openapi, web — jobs that never invoke the Go toolchain).
    required: false
    default: "true"
  bun-cache:
    description: >-
      Whether to cache the Bun install cache (~/.bun/install/cache) between runs.
      Set to "false" for jobs that never invoke Bun (e.g. govulncheck).
    required: false
    default: "true"

runs:
  using: composite
  steps:
    # Install mise and all tools declared in mise.toml (go, bun, java).
    # cache: true (the default) stores ~/.local/share/mise/installs in GitHub's
    # cache so binaries are not re-downloaded on subsequent runs.
    - uses: jdx/mise-action@v4
      with:
        cache: true

    - name: Cache Go modules
      if: ${{ inputs.go-cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go/build
        key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          go-${{ runner.os }}-

    - name: Cache Bun install
      if: ${{ inputs.bun-cache == 'true' }}
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-
